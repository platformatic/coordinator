name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        # Map host port 6390 to match the local docker-compose default,
        # so tests resolve REDIS_URL=redis://127.0.0.1:6390 with no env override.
        ports:
          - 6390:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run build
      - run: pnpm run test

  e2e:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6390:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: storage
          POSTGRES_PASSWORD: storage
          POSTGRES_DB: storage
        # Map to host 15432 (matches docker-compose.yml so local devs avoid
        # clashing with any other Postgres on 5432).
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U storage -d storage"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        node-version: [22, 24, 26]
    env:
      REDIS_URL: redis://127.0.0.1:6390
      PG_URL: postgresql://storage:storage@127.0.0.1:15432/storage
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run test:e2e

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bring up storage-db stack
        working-directory: examples/storage-db
        run: docker compose up --build -d --wait
      - name: Wait for coordinator + 3 live pods
        run: |
          for i in $(seq 1 60); do
            count=$(curl -sf http://127.0.0.1:8080/pods 2>/dev/null | jq -r '.count // 0')
            if [ "${count:-0}" -ge 3 ]; then
              echo "coordinator + 3 pods ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "coordinator + pods did not become ready in 60s (count=${count:-?})"
          docker compose -f examples/storage-db/docker-compose.yml logs
          exit 1
      - name: Run smoke script
        working-directory: examples/storage-db
        run: ./scripts/smoke.sh
      - name: Dump logs on failure
        if: failure()
        working-directory: examples/storage-db
        run: docker compose logs
      - name: Tear down
        if: always()
        working-directory: examples/storage-db
        run: docker compose down -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run lint
