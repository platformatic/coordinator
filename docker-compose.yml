services:
  redis:
    image: redis:8-alpine
    container_name: coordinator-test-redis
    ports:
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  postgres:
    image: postgres:17-alpine
    container_name: coordinator-test-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: storage
      POSTGRES_PASSWORD: storage
      POSTGRES_DB: storage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage -d storage"]
      interval: 2s
      timeout: 2s
      retries: 10
